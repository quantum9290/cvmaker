<!doctype html>
<html lang="tr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1280">
  <title>CV Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/pdfjs-dist@4.0.379/build/pdf.min.mjs" type="module"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --bg: #f3f5fa;
      --bg2: #ffffff;
      --bg3: #eef1f8;
      --line: #d6dbe6;
      --text: #1a1d26;
      --muted: #5b6478;
      --accent: #c8912a;
      --accent2: #e0a738;
      --good: #1f9d55;
      --warn: #b67410;
      --bad: #c53030;
      --info: #2962c8;
      --cv-accent: #c8912a;
      --cv-font: 'DM Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit
    }

    input,
    select,
    textarea {
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 12px;
      outline: none;
      width: 100%;
      transition: border-color .15s
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent)
    }

    textarea {
      resize: vertical;
      min-height: 90px;
      font-family: inherit
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Playfair Display', serif;
      font-weight: 600
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg3);
      border-radius: 8px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--line)
    }

    /* TOP BAR */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg2);
      border-bottom: 1px solid var(--line);
      padding: 10px 22px;
      display: flex;
      align-items: center;
      gap: 18px
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: .3px
    }

    .topbar .spacer {
      flex: 1
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg3);
      border: 1px solid var(--line);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted)
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bad)
    }

    .status-pill.ok .status-dot {
      background: var(--good);
      box-shadow: 0 0 8px var(--good)
    }

    .status-pill.ok {
      color: var(--good)
    }

    .btn {
      padding: 9px 16px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
      border: 1px solid var(--line);
      background: var(--bg3);
      color: var(--text)
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .btn.primary {
      background: var(--accent);
      color: #1a1a1a;
      border-color: var(--accent);
      font-weight: 600
    }

    .btn.primary:hover {
      background: var(--accent2);
      color: #1a1a1a
    }

    .btn.ai {
      background: linear-gradient(135deg, #6b4ce6, #a878ff);
      color: #fff;
      border: none
    }

    .btn.ai:hover {
      filter: brightness(1.15);
      color: #fff
    }

    .btn.danger {
      color: var(--bad);
      border-color: var(--bad)
    }

    .btn.danger:hover {
      background: var(--bad);
      color: #fff
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .btn:disabled:hover {
      border-color: var(--line);
      color: var(--text)
    }

    .btn.ai[data-ai-blocked] {
      opacity: .35;
      pointer-events: none
    }

    .btn.ai[data-ai-blocked]::after {
      content: " (AI meşgul)";
      font-size: 10px;
      opacity: .7
    }

    /* OLLAMA BANNER */
    #ollama-banner {
      display: none;
      background: linear-gradient(90deg, #fde8ea, #fbd5d8);
      border-bottom: 2px solid var(--bad);
      padding: 14px 22px;
      color: #5a1218
    }

    #ollama-banner.show {
      display: block
    }

    #ollama-banner .b-title {
      font-weight: 600;
      color: var(--bad);
      margin-bottom: 4px
    }

    #ollama-banner code {
      background: rgba(0, 0, 0, .06);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #8a1e28
    }

    #ollama-banner .b-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    #ollama-banner .b-actions button {
      padding: 6px 12px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #f3b4ba;
      color: #8a1e28;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer
    }

    #ollama-banner .b-actions button:hover {
      background: #fbd5d8
    }

    /* LAYOUT */
    .app {
      display: grid;
      grid-template-columns: minmax(700px, 1.45fr) minmax(460px, 0.8fr);
      gap: 0;
      height: calc(100vh - 60px)
    }

    .left {
      border-right: 1px solid var(--line);
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    .right {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg)
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      flex-shrink: 0
    }

    .tabs::-webkit-scrollbar {
      height: 0
    }

    .tab {
      padding: 14px 18px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all .15s;
      font-weight: 500
    }

    .tab:hover {
      color: var(--text)
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent)
    }

    .tab .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      opacity: .6;
      margin-right: 6px
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      animation: fadeIn .25s
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .tab-title {
      font-size: 22px;
      margin-bottom: 6px
    }

    .tab-sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 22px
    }

    /* FORM */
    .field {
      margin-bottom: 16px
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px
    }

    .field-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px
    }

    .field-row .field,
    .field-row-3 .field {
      margin-bottom: 16px
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px
    }

    /* SEARCHABLE DROPDOWN */
    .sdd {
      position: relative
    }

    .sdd-input {
      cursor: text
    }

    .sdd-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 30;
      display: none;
      box-shadow: 0 10px 30px rgba(15, 30, 60, .12)
    }

    .sdd-menu.open {
      display: block
    }

    .sdd-item {
      padding: 9px 12px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid var(--bg2)
    }

    .sdd-item:last-child {
      border-bottom: none
    }

    .sdd-item:hover,
    .sdd-item.hl {
      background: var(--bg3);
      color: var(--accent)
    }

    .sdd-item .meta {
      font-size: 10px;
      color: var(--muted);
      margin-left: 6px
    }

    .sdd-empty {
      padding: 14px;
      color: var(--muted);
      text-align: center;
      font-size: 12px
    }

    /* CHIPS */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 46px
    }

    .chip {
      padding: 6px 12px;
      border-radius: 16px;
      background: var(--bg3);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 5px
    }

    .chip:hover {
      border-color: var(--accent)
    }

    .chip.active {
      background: var(--accent);
      color: #1a1a1a;
      border-color: var(--accent);
      font-weight: 600
    }

    .chip .x {
      font-size: 14px;
      line-height: 1;
      opacity: .6
    }

    .chip:hover .x {
      opacity: 1
    }

    /* CARDS */
    .card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px
    }

    .card-h {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px
    }

    .card-h h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent)
    }

    .card-actions {
      display: flex;
      gap: 8px
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--bg3);
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .icon-btn.del:hover {
      border-color: var(--bad);
      color: var(--bad)
    }

    .add-card {
      width: 100%;
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      color: var(--muted);
      font-size: 13px;
      transition: all .15s;
      background: transparent
    }

    .add-card:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    /* COLLAPSIBLE */
    .collapsible {
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg2)
    }

    .collapsible-h {
      padding: 13px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
      font-size: 13px;
      background: var(--bg2)
    }

    .collapsible-h:hover {
      background: var(--bg3)
    }

    .collapsible-h .arr {
      transition: transform .2s;
      color: var(--accent)
    }

    .collapsible.open .collapsible-h .arr {
      transform: rotate(90deg)
    }

    .collapsible-body {
      padding: 0 16px 16px;
      display: none
    }

    .collapsible.open .collapsible-body {
      display: block
    }

    .collapsible .count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: rgba(232, 184, 75, .1);
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px
    }

    /* DROP ZONE */
    .dropzone {
      border: 2px dashed var(--line);
      border-radius: 14px;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      transition: all .2s;
      background: var(--bg2);
      cursor: pointer
    }

    .dropzone:hover,
    .dropzone.drag {
      border-color: var(--accent);
      background: rgba(232, 184, 75, .05);
      color: var(--accent)
    }

    .dropzone .ico {
      font-size: 36px;
      display: block;
      margin-bottom: 10px
    }

    .cert-card {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 14px;
      align-items: start;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px
    }

    .cert-thumb {
      width: 80px;
      height: 80px;
      background: var(--bg3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 11px;
      color: var(--muted)
    }

    .cert-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .cert-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0
    }

    .cert-input {
      background: var(--bg3);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s
    }

    .cert-input:focus {
      border-color: var(--accent)
    }

    .cert-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600
    }

    .cert-meta-row {
      display: grid;
      grid-template-columns: 1fr 90px 110px;
      gap: 6px
    }

    .cert-summary {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5
    }

    .cert-acts {
      display: flex;
      align-items: flex-start;
      padding-top: 4px
    }

    .cert-info h4 {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      margin-bottom: 4px
    }

    .cert-info .org {
      font-size: 12px;
      color: var(--muted)
    }

    .cert-info .badges {
      display: flex;
      gap: 6px;
      margin-top: 2px;
      flex-wrap: wrap
    }

    .badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--bg3);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace
    }

    .badge.cat-Teknik {
      background: rgba(95, 163, 255, .15);
      color: var(--info)
    }

    .badge.cat-Dil {
      background: rgba(95, 211, 138, .15);
      color: var(--good)
    }

    .badge.cat-SoftSkill {
      background: rgba(232, 184, 75, .15);
      color: var(--accent)
    }

    .badge.cat-Kurs {
      background: rgba(168, 120, 255, .15);
      color: #a878ff
    }

    .badge.score {
      background: rgba(232, 184, 75, .15);
      color: var(--accent)
    }

    /* RIGHT PREVIEW */
    .right-bar {
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0
    }

    .right-bar select,
    .right-bar .btn {
      padding: 7px 12px;
      font-size: 12px
    }

    .right-content {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      justify-content: center
    }

    #cv-pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px
    }

    .cv-page-frame {
      width: 210mm;
      height: 297mm;
      overflow: hidden;
      position: relative;
      background: #fff;
      box-shadow: 0 8px 30px rgba(15, 30, 60, .12), 0 2px 6px rgba(15, 30, 60, .06);
      flex-shrink: 0;
      transform-origin: top center;
    }

    .cv-page-frame .cv-paper {
      box-shadow: none;
      min-height: auto;
      position: absolute;
      left: 0;
      top: 0;
      width: 210mm
    }

    .cv-page-num {
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: 9px;
      color: #999;
      z-index: 5
    }

    .cv-paper {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      color: #1a1a1a;
      padding: 50px 55px 50px 80px;
      font-family: var(--cv-font);
      font-size: 11px;
      line-height: 1.55;
      box-shadow: 0 8px 30px rgba(15, 30, 60, .12), 0 2px 6px rgba(15, 30, 60, .06);
      position: relative;
      border-left: 8px solid var(--cv-accent);
      box-sizing: border-box !important;
      /* Kenarlığı genişliğin içine hapseder */
    }

    .cv-name {
      font-size: 30px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.1;
      margin-bottom: 6px;
      letter-spacing: -.5px
    }

    .cv-target {
      font-size: 13px;
      color: var(--cv-accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px
    }

    .cv-contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 10.5px;
      color: #444;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #ddd
    }

    .cv-contacts span {
      display: inline-flex;
      align-items: center;
      gap: 4px
    }

    .cv-section {
      margin-bottom: 18px;
      break-inside: avoid
    }

    .cv-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--cv-accent);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      padding-bottom: 4px;
      border-bottom: 1.5px solid var(--cv-accent)
    }

    .cv-entry {
      margin-bottom: 11px;
      break-inside: avoid
    }

    .cv-entry-h {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 3px;
      align-items: baseline
    }

    .cv-entry-h h4 {
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: #1a1a1a
    }

    .cv-entry-h .date {
      font-size: 10px;
      color: #666;
      font-style: italic;
      white-space: nowrap;
      flex-shrink: 0;
      text-align: right
    }

    .cv-entry-sub {
      font-size: 11px;
      color: #444;
      font-style: italic;
      margin-bottom: 4px
    }

    .cv-bullets {
      list-style: none;
      padding-left: 0;
      margin-top: 4px
    }

    .cv-bullets li {
      position: relative;
      padding-left: 14px;
      margin-bottom: 3px;
      font-size: 10.5px;
      color: #222
    }

    .cv-bullets li::before {
      content: "▸";
      position: absolute;
      left: 0;
      color: var(--cv-accent);
      font-size: 10px
    }

    .cv-paper.en-template .cv-bullets li::before {
      content: "—";
      color: #1a1a1a
    }

    .cv-summary {
      font-size: 11px;
      color: #222;
      text-align: justify;
      line-height: 1.65
    }

    .cv-skills-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 6px 12px;
      font-size: 10.5px
    }

    .cv-skills-grid b {
      color: #1a1a1a
    }

    .cv-empty {
      text-align: center;
      color: #aaa;
      padding: 60px 20px;
      font-style: italic;
      font-size: 13px
    }

    .two-col .cv-section {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 24px;
      align-items: start;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
      margin-bottom: 16px
    }

    .two-col .cv-section:last-child {
      border-bottom: none
    }

    .two-col .cv-section-title {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
      text-align: left;
      line-height: 1.3
    }

    .two-col .cv-section > *:not(.cv-section-title) {
      min-width: 0
    }

    .two-col .cv-skills-grid {
      grid-template-columns: 110px 1fr;
      gap: 4px 10px
    }

    .two-col .cv-summary {
      margin-top: 0
    }

    /* ATS */
    .ats-widget {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .ats-ring {
      width: 46px;
      height: 46px;
      position: relative
    }

    .ats-ring svg {
      transform: rotate(-90deg)
    }

    .ats-ring .bg-c {
      stroke: var(--bg3)
    }

    .ats-ring .fg-c {
      stroke: var(--good);
      transition: stroke-dashoffset .6s, stroke .3s
    }

    .ats-ring .num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600
    }

    .ats-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .ats-score {
      font-size: 14px;
      font-weight: 600
    }

    /* MODAL */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(20, 28, 48, .45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px)
    }

    .modal-bg.open {
      display: flex
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      width: 540px;
      max-width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(15, 30, 60, .18)
    }

    .modal h2 {
      font-size: 20px;
      margin-bottom: 16px;
      color: var(--accent)
    }

    .modal .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px
    }

    /* TOAST */
    #toast-stack {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .toast {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 8px 30px rgba(15, 30, 60, .15);
      animation: slideIn .3s;
      min-width: 240px;
      color: var(--text)
    }

    .toast.ok {
      border-left-color: var(--good)
    }

    .toast.err {
      border-left-color: var(--bad)
    }

    .toast.warn {
      border-left-color: var(--warn)
    }

    @keyframes slideIn {
      from {
        transform: translateX(20px);
        opacity: 0
      }

      to {
        transform: translateX(0);
        opacity: 1
      }
    }

    /* SKELETON */
    .skel {
      background: linear-gradient(90deg, var(--bg3) 0%, var(--line) 50%, var(--bg3) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
      margin: 6px 0
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 12px;
      font-style: italic
    }

    .thinking::before {
      content: "●";
      animation: pulse 1s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .3
      }

      50% {
        opacity: 1
      }
    }

    .summary-variant {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px
    }

    .summary-variant h4 {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px
    }

    .summary-variant p {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 10px
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px
    }

    .skill-counter {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 8px 0;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      z-index: 5
    }

    .skill-counter b {
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace
    }

    .file-input {
      display: none
    }

    /* PRINT */
    @media print {
      body {
        background: #fff
      }

      .topbar,
      .left,
      .right-bar,
      #ollama-banner,
      #toast-stack,
      .modal-bg,
      #cv-pages {
        display: none !important
      }

      .app {
        display: block;
        height: auto
      }

      .right {
        background: #fff;
        overflow: visible
      }

      .right-content {
        padding: 0;
        display: block;
        overflow: visible
      }

      #cv-preview {
        box-shadow: none !important;
        position: static !important;
        left: auto !important;
        top: auto !important;
        visibility: visible !important;
        opacity: 1 !important;
        z-index: auto !important;
        pointer-events: auto !important;
      }

      .cv-section {
        break-inside: avoid
      }

      .cv-entry {
        break-inside: avoid
      }

      .pb-spacer {
        display: block !important
      }

      @page {
        size: A4;
        margin: 0;
      }
    }
  </style>
</head>

            btn.setAttribute('data-ai-blocked', 'true');
          }
        });
      },

      unlockAllButtons() {
        document.querySelectorAll('.btn.ai').forEach(btn => {
          btn.disabled = !ollamaOnline;
          btn.removeAttribute('data-ai-blocked');
        });
      },

      async run(taskFn, activeBtn, taskInfo) {
        return new Promise((resolve, reject) => {
          const execute = async () => {
            this._busy = true;
            this._activeTask = taskInfo || null;
            this.lockAllButtons(activeBtn || null);
            try {
              const result = await taskFn();
              resolve(result);
            } catch (e) {
              reject(e);
            } finally {
              this._busy = false;
              this._activeTask = null;
              if (this._queue.length > 0) {
                const next = this._queue.shift();
                next();
              } else {
                this.unlockAllButtons();
              }
            }
          };

          if (this._busy) {
            this._queue.push(execute);
          } else {
            execute();
          }
        });
      }
    };

    async function ollamaChat(messages, opts = {}) {
      if (!ollamaOnline) { showToast("Ollama bağlı değil", "err"); throw new Error("offline"); }
      const body = { model: appState.ayarlar.model, messages, stream: true, think: opts.think !== undefined ? opts.think : true };
      if (opts.json) body.format = "json";
      if (opts.options) body.options = opts.options;
      console.log("[Ollama] istek gönderiliyor (stream)", body);
      try {
        const r = await fetch(appState.ayarlar.ollamaUrl + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        if (!r.ok) {
          const txt = await r.text().catch(() => "");
          let extra = txt.slice(0, 300);
          if (r.status === 404 && txt.includes("model")) extra += "\n→ Ayarlar'dan doğru modeli seçin veya 'ollama pull " + appState.ayarlar.model + "' çalıştırın.";
          throw new Error(`HTTP ${r.status}: ${extra}`);
        }
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let content = "", buf = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split("\n");
          buf = lines.pop();
          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const chunk = JSON.parse(line);
              if (chunk.message && chunk.message.content) content += chunk.message.content;
            } catch (e) { }
          }
        }
        if (buf.trim()) { try { const chunk = JSON.parse(buf); if (chunk.message && chunk.message.content) content += chunk.message.content; } catch (e) { } }
        content = content.replace(/<think>[\s\S]*?<\/think>/g, "").trim();
        console.log("[Ollama] yanıt (stream tamamlandı)", content.slice(0, 200));
        if (!content) throw new Error("Boş yanıt — model içerik üretemedi.");
        return content;
      } catch (e) {
        if (e.message === "Failed to fetch") throw new Error("Bağlantı/CORS hatası. Terminalde:\n  setx OLLAMA_ORIGINS \"*\"\nve Ollama'yı yeniden başlatın.");
        throw e;
      }
    }

    // File → base64
    function fileToBase64(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => {
          const img = new Image();
          img.onload = () => {
            const MAX = 768;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) { const s = MAX / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
            const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
            cv.getContext("2d").drawImage(img, 0, 0, w, h);
            res(cv.toDataURL("image/jpeg", 0.8).split(",")[1]);
          };
          img.onerror = rej;
          img.src = r.result;
        };
        r.onerror = rej;
        r.readAsDataURL(file);
      });
    }
    async function pdfFirstPageBase64(file) {
      // PDF.js ile ilk sayfayı canvas'a render et — CDN'den yüklenene kadar bekle
      for (let i = 0; i < 20 && !window.__pdfjs; i++) { await new Promise(r => setTimeout(r, 500)); }
      if (!window.__pdfjs) throw new Error("PDF.js yüklenemedi – lütfen sayfayı yenileyin.");
      const buf = await file.arrayBuffer();
      const pdf = await window.__pdfjs.getDocument({ data: buf }).promise;
      const page = await pdf.getPage(1);
      const vp = page.getViewport({ scale: 1.0 });
      const cv = document.createElement("canvas");
      cv.width = vp.width; cv.height = vp.height;
      await page.render({ canvasContext: cv.getContext("2d"), viewport: vp }).promise;
      const MAX = 768; let w = cv.width, h = cv.height;
      if (w > MAX || h > MAX) { const s = MAX / Math.max(w, h); const cv2 = document.createElement("canvas"); cv2.width = Math.round(w * s); cv2.height = Math.round(h * s); cv2.getContext("2d").drawImage(cv, 0, 0, cv2.width, cv2.height); return cv2.toDataURL("image/jpeg", 0.8).split(",")[1]; }
      return cv.toDataURL("image/jpeg", 0.8).split(",")[1];
    }

    function createSearchableDropdown(opts) {
      // opts: items[], value, onChange, placeholder, allowCustom, multi
      const wrap = el("div", "sdd");
      wrap.style.position = "relative";
      const input = el("input"); input.className = "sdd-input"; input.placeholder = opts.placeholder || "Ara...";
      if (opts.multi) input.style.paddingRight = "65px";

      if (opts.multi && Array.isArray(opts.value)) input.value = opts.value.join(", ") + (opts.value.length ? ", " : "");
      else input.value = opts.value || "";

      const menu = el("div", "sdd-menu");
      wrap.appendChild(input);

      if (opts.multi) {
        const clr = el("div", null, "Temizle");
        clr.style.cssText = "position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#666;cursor:pointer;background:#eee;padding:3px 6px;border-radius:4px;font-weight:600;z-index:2;box-shadow:0 1px 2px rgba(0,0,0,0.1)";
        clr.onmousedown = (e) => {
          e.preventDefault(); e.stopPropagation();
          input.value = "";
          render();
          if (opts.onChange) opts.onChange([]);
        };
        wrap.appendChild(clr);
      }

      wrap.appendChild(menu);
      const items = opts.items.map(it => typeof it === "string" ? { label: it } : it);

      function getTokens() {
        return input.value.split(',').map(s => s.trim()).filter(x => x);
      }

      function getSearchTerm() {
        if (!opts.multi) return (input.value || "").toLowerCase().trim();
        if (input.value.endsWith(",") || input.value.endsWith(", ")) return "";
        return (input.value.split(',').pop() || "").toLowerCase().trim();
      }

      function render() {
        menu.innerHTML = "";
        const f = getSearchTerm();
        const tokens = opts.multi ? getTokens() : [];
        const matches = items.filter(it => !f || it.label.toLowerCase().includes(f)).slice(0, 800);
        if (!matches.length) {
          menu.appendChild(el("div", "sdd-empty", "Eşleşme yok" + (opts.allowCustom ? " — Enter ile ekle" : "")));
          return;
        }
        matches.forEach(it => {
          const isSel = opts.multi && tokens.includes(it.label);
          const d = el("div", "sdd-item" + (isSel ? " selected" : ""), it.label + (isSel ? " <span style='float:right;color:var(--cv-accent);font-weight:bold'>✓</span>" : "") + (it.meta ? `<span class="meta">${it.meta}</span>` : ""));
          if (isSel) { d.style.background = "rgba(0,0,0,0.03)"; d.style.fontWeight = "600"; }
          d.onclick = (e) => {
            e.stopPropagation();
            if (opts.multi) {
              let vals = getTokens();
              if (!input.value.endsWith(",") && !input.value.endsWith(", ")) vals.pop();
              if (vals.includes(it.label)) vals = vals.filter(v => v !== it.label);
              else vals.push(it.label);
              input.value = vals.length ? vals.join(", ") + ", " : "";
              render();
              if (opts.onChange) opts.onChange(getTokens());
              input.focus();
            } else {
              input.value = it.label;
              menu.classList.remove("open");
              if (opts.onChange) opts.onChange(it.label);
            }
          };
          menu.appendChild(d);
        });
      }
      input.onfocus = () => { render(); menu.classList.add("open"); };
      input.oninput = () => {
        render();
        menu.classList.add("open");
        if (opts.onChange && opts.allowCustom) opts.onChange(opts.multi ? getTokens() : input.value);
      };
      input.onkeydown = (e) => { if (e.key === "Enter") { if (opts.allowCustom) { if (opts.onChange) opts.onChange(opts.multi ? getTokens() : input.value); } menu.classList.remove("open"); } if (e.key === "Escape") menu.classList.remove("open"); };
      document.addEventListener("click", e => { if (!wrap.contains(e.target)) menu.classList.remove("open"); });
      return wrap;
    }

    async function extractTextFromPDF(file) {
      for (let i = 0; i < 20 && !window.__pdfjs; i++) { await new Promise(r => setTimeout(r, 500)); }
      if (!window.__pdfjs) throw new Error("PDF.js yüklenemedi");
      const buf = await file.arrayBuffer();
      const pdf = await window.__pdfjs.getDocument({ data: buf }).promise;
      let text = "";
      const pages = Math.min(pdf.numPages, 3);
      for (let i = 1; i <= pages; i++) {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        text += tc.items.map(it => it.str).join(" ") + "\n";
      }
      return text.trim();
    }
    async function extractTextFromImage(fileOrUrl) {
      for (let i = 0; i < 20 && !window.Tesseract; i++) { await new Promise(r => setTimeout(r, 500)); }
      if (!window.Tesseract) throw new Error("Tesseract.js yüklenemedi — sayfayı yenileyin");
      const { data: { text } } = await Tesseract.recognize(fileOrUrl, "tur+eng", { logger: m => console.log("[OCR]", m.status, Math.round((m.progress || 0) * 100) + "%") });
      return text.trim();
    }
    function base64ToBlob(b64, mime) {
      const bin = atob(b64), arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++)arr[i] = bin.charCodeAt(i);
      return new Blob([arr], { type: mime });
    }
    async function processCertFile(file) {
      if (!ollamaOnline) { showToast("Ollama bağlı değil", "err"); return; }

        if (file.type === "application/pdf") {
          const b64 = await pdfFirstPageBase64(file);
          thumb = "data:image/jpeg;base64," + b64;
          docText = await extractTextFromPDF(file);
          // Taranmış PDF — metin katmanı yoksa OCR fallback
          if (!docText || docText.length < 5) {
            _toast.innerHTML = 'Taranmış PDF — OCR çalışıyor… <span class="ai-sec">0s</span>';
            const blob = base64ToBlob(b64, "image/jpeg");
            docText = await extractTextFromImage(blob);

        } else {
          const b64 = await fileToBase64(file);
          thumb = "data:image/jpeg;base64," + b64;
          _toast.innerHTML = 'OCR ile metin çıkarılıyor… <span class="ai-sec">0s</span>';
          docText = await extractTextFromImage(file);

        const lines = docText.split("\n").map(l => l.trim()).filter(l => l.length > 3);

Sadece JSON döndür.`;
        const out = await aiQueue.run(async () => {
          return await ollamaChat([{ role: "system", content: sysPrompt }, { role: "user", content: "Dosya adı ipucu: " + cleanName + "\n\nBelge metni:\n" + docText.slice(0, 3000) }], { json: true, think: false, options: { num_predict: 384, temperature: 0.2 } });

    // =================== ATS SCORING ===================
    function recalcAtsScore() {
      let s = 0; const issues = [];
      const p = appState.profile;

      // 1. İletişim & Profil (20 Puan)
      if (p.ad && p.soyad) s += 2; else issues.push("Ad ve soyad eksik");
      if (p.email) s += 4; else issues.push("E-posta adresi eksik");
      if (p.phone) s += 4; else issues.push("Telefon numarası eksik");
      if (p.sehir) s += 2; else issues.push("Lokasyon (Şehir) eksik");
      if (p.linkedin) s += 4; else issues.push("LinkedIn profili eklenmeli");
      if (p.github || p.portfolio) s += 4; else issues.push("GitHub veya Portfolyo linki önerilir");

      // 2. Hedef & Özet (15 Puan)
      if (p.hedefPozisyon && p.hedefPozisyon.length) s += 5; else issues.push("Hedef pozisyon başlığı eksik");
      const ozet = appState.ozet.tr || appState.ozet.en || "";
      if (ozet.length > 100) s += 10;
      else if (ozet.length > 0) { s += 5; issues.push("Profesyonel özet çok kısa (en az 2-3 cümle olmalı)"); }
      else issues.push("Profesyonel özet (Hakkımda) boş");

      // 3. Deneyim (30 Puan)
      if (appState.deneyim.length > 0) {
        s += 10;
        let totalBullets = 0;
        let hasDates = true;
        appState.deneyim.forEach(d => {
          if (d.bullets && d.bullets.length) totalBullets += d.bullets.length;
          else if (d.gorevChips && d.gorevChips.length) totalBullets += d.gorevChips.length;
          if (!d.basYil) hasDates = false;
        });

        if (totalBullets >= 6) s += 15;
        else if (totalBullets >= 3) { s += 8; issues.push("Deneyimlerdeki madde imleri (Başarılar) artırılmalı"); }
        else issues.push("Deneyimlere görev tanımı / başarı eklenmemiş");

        if (hasDates) s += 5; else issues.push("Deneyim tarihlerinde eksiklik var");
      } else {
        issues.push("En az 1 iş/staj deneyimi eklenmeli");
      }

      // 4. Eğitim (10 Puan)
      if (appState.egitim.length > 0) {
        s += 6;
        let hasGpa = false, hasCourse = false;
        appState.egitim.forEach(e => {
          if (e.gpa) hasGpa = true;
          if (e.dersler && e.dersler.length > 0) hasCourse = true;
        });
        if (hasGpa) s += 2; else issues.push("Eğitim sekmesine GPA eklenebilir");
        if (hasCourse) s += 2; else issues.push("Eğitim sekmesine önemli dersler eklenebilir");
      } else {
        issues.push("Eğitim bilgisi eksik");
      }

      // 5. Beceriler & Ekstralar (25 Puan)
      let teknikSay = 0;
      Object.entries(appState.beceriler).forEach(([k, v]) => {
        if (k !== "diller" && k !== "soft") teknikSay += v.length;
      });
      if (teknikSay >= 8) s += 10;
      else if (teknikSay >= 4) { s += 6; issues.push("Daha fazla teknik yetenek (Hard Skill) eklenmeli"); }
      else if (teknikSay >= 1) { s += 2; issues.push("Teknik beceri sayısı düşük (Anahtar kelimeler ATS için kritik)"); }
      else issues.push("Teknik beceri yetersiz (Anahtar kelimeler ATS için kritik)");

      if (appState.beceriler.soft.length >= 3) s += 5;
      else issues.push("Kişisel / Sosyal beceriler (Soft Skills) eklenmeli");

      if (appState.beceriler.diller.length > 0) s += 5;
      else issues.push("Yabancı dil eklenmeli");

      let extrasSay = 0;
      if (appState.projeler.length >= 2) extrasSay += 3;
      else if (appState.projeler.length >= 1) extrasSay += 2;
      if (appState.sertifikalar.length >= 1) extrasSay += 2;
      if (appState.gonulluluk.length >= 1) extrasSay += 1;
      s += Math.min(5, extrasSay);
      if (extrasSay === 0) issues.push("Proje, Sertifika veya Gönüllülük bölümlerine girdi yapılmalı");

      // Cap: iletişim bilgisi eksikliği skoru sınırlar
      if (!p.email || !p.phone) {
        s = Math.min(s, 75);
        issues.push("İletişim bilgisi (E-posta/Telefon) eksikliği skoru sınırlandırıyor");
      }

      s = Math.max(0, Math.min(100, s));
      animateAtsTo(s);
      return { score: s, issues };
    }
    function animateAtsTo(target) {
      const numEl = document.getElementById("ats-num");
      const txtEl = document.getElementById("ats-text");
      const circle = document.getElementById("ats-circle");
      const cur = parseInt(numEl.textContent) || 0;
      const start = performance.now(); const dur = 600;
      function step(t) {
        const k = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - k, 3);
        const val = Math.round(cur + (target - cur) * eased);
        numEl.textContent = val;
        const C = 2 * Math.PI * 19;
        circle.style.strokeDashoffset = C * (1 - val / 100);
        let color = "var(--bad)"; let label = "Zayıf";
        if (val >= 80) { color = "var(--good)"; label = "Mükemmel"; }
        else if (val >= 60) { color = "var(--warn)"; label = "Orta"; }
        circle.style.stroke = color;
        txtEl.textContent = label;
        if (k < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function applyPageBreaks() {
      const cv = document.getElementById("cv-preview");
      if (!cv) return;
      const m = document.createElement('div');
      m.style.cssText = 'width:210mm;height:297mm;position:absolute;visibility:hidden;pointer-events:none';
      document.body.appendChild(m);
      const pageH = m.offsetHeight;
      document.body.removeChild(m);
      cv.querySelectorAll('.pb-spacer').forEach(s => s.remove());
      const TOP_MARGIN = 40;
      const BOTTOM_THRESHOLD = 110;
      const els = cv.querySelectorAll('.cv-section-title, .cv-entry');
      els.forEach(el => {
        const posInCv = el.getBoundingClientRect().top - cv.getBoundingClientRect().top;
        const posInPage = posInCv % pageH;
        const remaining = pageH - posInPage;
        // Alt kenar: kalan boşluk az ise sonraki sayfaya ittir + üst marj ekle
        if (remaining < BOTTOM_THRESHOLD && posInPage > 60) {
          const spacer = document.createElement('div');
          spacer.className = 'pb-spacer';
          spacer.style.height = (remaining + TOP_MARGIN) + 'px';
          el.parentNode.insertBefore(spacer, el);
          return;
        }
        // Üst kenar: element sayfa başına çok yakın düştüyse (ilk element hariç) üst marj bırak
        if (posInPage < TOP_MARGIN && posInCv > 60) {
          const spacer = document.createElement('div');
          spacer.className = 'pb-spacer';
          spacer.style.height = (TOP_MARGIN - posInPage) + 'px';
          el.parentNode.insertBefore(spacer, el);
        }
      });
    }
    function paginatePreview() {
      const source = document.getElementById("cv-preview");
      const pagesDiv = document.getElementById("cv-pages");
      if (!pagesDiv || !source) return;
      // Measure 297mm in pixels
      const m = document.createElement('div');
      m.style.cssText = 'width:210mm;height:297mm;position:absolute;visibility:hidden;pointer-events:none';
      document.body.appendChild(m);
      const pageH = m.offsetHeight;
      const pageW = m.offsetWidth;
      document.body.removeChild(m);
      // Calculate scale to fit the container
      const container = pagesDiv.parentElement;
      const availW = container.clientWidth - 28;
      const scale = Math.min(0.88, Math.max(0.45, availW / pageW));
      const extraW = pageW * (1 - scale) / 2;
      const extraH = pageH * (1 - scale);
      const totalH = source.scrollHeight;
      const numPages = Math.max(1, Math.ceil(totalH / pageH));
      pagesDiv.innerHTML = '';
      for (let i = 0; i < numPages; i++) {
        const frame = document.createElement('div');
        frame.className = 'cv-page-frame';
        frame.style.transform = `scale(${scale})`;
        frame.style.marginLeft = `-${extraW}px`;
        frame.style.marginRight = `-${extraW}px`;
        frame.style.marginBottom = `${i < numPages - 1 ? -extraH + 24 : -extraH}px`;
        const clone = source.cloneNode(true);
        clone.removeAttribute('id');
        clone.style.position = 'absolute';
        clone.style.left = '0';
        clone.style.top = (-i * pageH) + 'px';
        clone.style.visibility = 'visible';
        clone.style.opacity = '1';
        clone.style.pointerEvents = 'auto';
        clone.style.zIndex = 'auto';
        clone.style.boxShadow = 'none';
        frame.appendChild(clone);
        const num = document.createElement('div');
        num.className = 'cv-page-num';
        num.textContent = (i + 1) + ' / ' + numPages;
        frame.appendChild(num);
        pagesDiv.appendChild(frame);
      }
    }
    function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
    function monthName(n, lang) {
      const tr = ["", "Oca", "Şub", "Mar", "Nis", "May", "Haz", "Tem", "Ağu", "Eyl", "Eki", "Kas", "Ara"];
      const en = ["", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      return (lang === "en" ? en : tr)[parseInt(n)] || "";
    }

    // =================== SETTINGS / MODALS ===================
    function openModal(id) { document.getElementById(id).classList.add("open"); }
    function closeModal(id) { document.getElementById(id).classList.remove("open"); }
    window.closeModal = closeModal;

    async function openSettings() {
      document.getElementById("set-url").value = appState.ayarlar.ollamaUrl;
      const sel = document.getElementById("set-model"); sel.innerHTML = "";
      const models = await listOllamaModels();
      if (!models.length) { const o = el("option"); o.value = appState.ayarlar.model; o.textContent = appState.ayarlar.model; sel.appendChild(o); }
      models.forEach(m => { const o = el("option"); o.value = m; o.textContent = m; sel.appendChild(o); });
      sel.value = appState.ayarlar.model;
      openModal("modal-settings");
    }

    async function analyzeCv() {
      if (!ollamaOnline) { showToast("Ollama bağlı değil", "err"); return; }
      openModal("modal-analyze");
      const body = document.getElementById("analyze-body");
      body.innerHTML = '<div class="thinking">AI CV\'nizi analiz ediyor… <span class="ai-sec">0s</span></div>';
      const _t = aiTimer(body);
      try {
        await aiQueue.run(async () => {
          const hedefPoz = appState.profile.hedefPozisyon || "mühendislik stajı";
          const prompt = `ROL: Sen, 10+ yıl deneyimli bir İK direktörü, ATS sistemi mimarı ve kariyer koçusun. Türkiye'deki mühendislik ve teknik pozisyonlar için işe alım süreçlerini yönetmişsin.

GÖREV: Bu CV'yi "${hedefPoz}" hedef pozisyonu bağlamında kapsamlı şekilde analiz et ve puanla.

PUANLAMA MATRİSİ (her kategoriyi 1-10 arası puanla):

1. İÇERİK KALİTESİ (Puan: ?/10):
   - Bullet point'lerdeki aksiyon fiilleri ne kadar güçlü? (zayıf: "yaptı/yardım etti" vs güçlü: "optimize etti/geliştirdi")
   - Ölçülebilir sonuçlar (metrikler, rakamlar) yeterli mi?
   - Her bullet bilgi taşıyor mu yoksa dolgu mu?

2. ATS UYUMLULUK (Puan: ?/10):
   - "${hedefPoz}" pozisyonu için kritik anahtar kelimeler mevcut mu?
   - Sektörel terminoloji (standartlar, araçlar, protokoller) yeterli mi?
   - Keyword density uygun mu (ne çok az ne çok fazla)?

3. PROFESYONEL DİL (Puan: ?/10):
   - Zayıf veya pasif fiiller var mı?
   - Belirsiz ifadeler ("çeşitli", "farklı", "bazı") kullanılmış mı?
   - Tekrar eden kalıplar veya kelimeler var mı?

4. YAPI & DENGE (Puan: ?/10):
   - Deneyim, eğitim, beceri, proje bölümleri dengeli mi?
   - Hedef pozisyonla en alakalı deneyim öne çıkıyor mu?
   - Eksik veya zayıf bölümler hangileri?

5. STRATEJİK POZİSYONLAMA (Puan: ?/10):
   - CV, "${hedefPoz}" pozisyonu için optimize edilmiş mi?
   - Adayın benzersiz değer önerisi net mi?
   - Kariyer hedefiyle deneyimler arasında tutarlılık var mı?

GENEL DEĞERLENDİRME:
- Toplam skor (50 üzerinden) ve harf notu (A/B/C/D/F) ver.
- CV'nin en güçlü 2 yanını belirt.

ÖNERİ KURALLARI:
- Her öneri SOMUT ve UYGULANABİLİR olsun.
- KÖTÜ: "Deneyim bölümünü geliştirin" — YASAK.
- İYİ: "Deneyim #1'deki 2. maddede 'rapor hazırladı' yerine 'IEC 60364 standardına uygun 12 adet periyodik kontrol raporu hazırlayarak denetim sürecini hızlandırdı' yazın" — BÖYLE OLSUN.
- 8-12 arası öneri ver.

SADECE JSON döndür:
{"puanlar":{"icerik":{"puan":0,"yorum":"..."},"ats":{"puan":0,"yorum":"..."},"dil":{"puan":0,"yorum":"..."},"yapi":{"puan":0,"yorum":"..."},"strateji":{"puan":0,"yorum":"..."}},"toplam_puan":0,"harf_notu":"?","guclu_yanlar":["...","..."],"oneriler":[{"sorun":"...","oneri":"...","oncelik":"yuksek|orta|dusuk","kategori":"icerik|ats|dil|yapi|strateji"}]}

${JSON.stringify(appState).slice(0, 4000)}`;
          const out = await ollamaChat([{ role: "user", content: prompt }], { json: true });
          const parsed = extractJSON(out);
          body.innerHTML = "";

          // Scorecard header
          const scoreHeader = el("div");
          scoreHeader.style.cssText = "text-align:center;padding:16px;background:var(--bg3);border-radius:8px;margin-bottom:16px";
          const tp = parsed.toplam_puan || 0;
          const hn = parsed.harf_notu || "?";
          scoreHeader.innerHTML = `<div style="font-size:32px;font-weight:700;color:var(--accent)">${tp}/50</div><div style="font-size:18px;color:var(--muted)">Harf Notu: <b>${esc(hn)}</b></div>`;
          body.appendChild(scoreHeader);

          // Category scores with progress bars
          const categories = { icerik: "İçerik Kalitesi", ats: "ATS Uyumluluk", dil: "Profesyonel Dil", yapi: "Yapı & Denge", strateji: "Stratejik Pozisyonlama" };
          Object.entries(parsed.puanlar || {}).forEach(([key, val]) => {
            const row = el("div");
            row.style.cssText = "display:flex;align-items:center;gap:12px;padding:8px;margin-bottom:4px";
            const puan = val.puan || 0;
            const color = puan >= 7 ? "var(--good)" : puan >= 4 ? "var(--accent)" : "var(--bad)";
            row.innerHTML = `<div style="width:180px;font-weight:500;font-size:13px">${categories[key] || key}</div><div style="flex:1;background:var(--bg3);height:8px;border-radius:4px"><div style="width:${puan * 10}%;height:100%;background:${color};border-radius:4px;transition:width .3s"></div></div><div style="width:40px;text-align:right;font-weight:600;font-size:13px">${puan}/10</div>`;
            body.appendChild(row);
            if (val.yorum) {
              const comment = el("div");
              comment.style.cssText = "font-size:11px;color:var(--muted);margin:0 0 8px 192px";
              comment.textContent = val.yorum;
              body.appendChild(comment);
            }
          });

          // Strong points
          if (parsed.guclu_yanlar && parsed.guclu_yanlar.length) {
            const gBox = el("div");
            gBox.style.cssText = "margin:16px 0;padding:12px;background:rgba(95,211,138,.08);border-left:3px solid var(--good);border-radius:6px";
            gBox.innerHTML = `<div style="font-weight:600;color:var(--good);margin-bottom:6px">Güçlü Yanlar</div>` + parsed.guclu_yanlar.map(g => `<div style="font-size:13px;margin-bottom:4px">• ${esc(g)}</div>`).join("");
            body.appendChild(gBox);
          }

          // Recommendations
          const recTitle = el("div"); recTitle.style.cssText = "font-weight:600;margin:16px 0 8px;font-size:14px"; recTitle.textContent = "Öneriler";
          body.appendChild(recTitle);
          (parsed.oneriler || []).forEach(o => {
            const card = el("div"); card.style.cssText = "background:var(--bg3);border-left:3px solid " + (o.oncelik === "yuksek" ? "var(--bad)" : o.oncelik === "orta" ? "var(--accent)" : "var(--muted)") + ";padding:12px;border-radius:6px;margin-bottom:8px";
            const badge = o.oncelik === "yuksek" ? "color:var(--bad)" : o.oncelik === "orta" ? "color:var(--accent)" : "color:var(--muted)";
            card.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:11px;${badge};font-weight:600;text-transform:uppercase">${esc(o.sorun)}</div><span style="font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg2);${badge}">${esc(o.oncelik || "orta")}</span></div><div style="font-size:13px;margin-top:6px">${esc(o.oneri)}</div>`;
            body.appendChild(card);
          });
          _t.stop();
        }, null, { tab: "_analyze", label: "CV Analiz" });
      } catch (e) { _t.stop(); body.innerHTML = `<div style="color:var(--bad)">Hata: ${esc(e.message)}</div>`; }
    }

    // =================== INIT ===================
    async function init() {
      console.log("[CV] Uygulama başlatılıyor");
      loadState();
      renderTabs(); renderActiveTab(); renderPreview(); recalcAtsScore(); updateSaveStatus();

      // Top bar buttons
      document.getElementById("btn-settings").onclick = openSettings;
      document.getElementById("btn-analyze").onclick = analyzeCv;
      async function downloadPdf(lang) {
        const prevLang = appState.meta.lang;
        const langSel = document.getElementById("tpl-lang");
        const langChanged = lang !== prevLang;
        if (langChanged) {
          langSel.value = lang;
          appState.meta.lang = lang;
          renderPreview();
        }
        showToast("Yazdırılıyor...", "info");
        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 400));

        // Use native window.print() which produces crisp text and perfect layout with @media print
        window.print();
        showToast("Seçilebilir PDF almak için 'PDF Olarak Kaydet' yöntemini seçin.", "ok");

        if (langChanged) {
          appState.meta.lang = prevLang;
          langSel.value = prevLang;
          renderPreview();
        }
      }

      document.getElementById("btn-print-tr").onclick = () => downloadPdf("tr");
        document.getElementById("btn-print-en").onclick = () => downloadPdf("en");

        // Right bar
        ["tpl-color", "tpl-font", "tpl-cols"].forEach(id => { document.getElementById(id).onchange = renderPreview; });
        document.getElementById("tpl-lang").onchange = (e) => {
          appState.meta.lang = e.target.value;
          saveState();
          renderPreview();
          renderActiveTab();
        };
        document.getElementById("tpl-lang").value = appState.meta.lang || "tr";

        // Settings
        document.getElementById("set-test").onclick = async () => {
          appState.ayarlar.ollamaUrl = document.getElementById("set-url").value;
          const r = await checkOllama();
          showToast(r ? "Bağlantı başarılı" : "Bağlantı başarısız", r ? "ok" : "err");
          if (r) { const sel = document.getElementById("set-model"); sel.innerHTML = ""; r.forEach(m => { const o = el("option"); o.value = m; o.textContent = m; sel.appendChild(o); }); }
        };
        document.getElementById("set-model").onchange = e => { appState.ayarlar.model = e.target.value; saveState(); };
        document.getElementById("set-export").onclick = () => {
          const blob = new Blob([JSON.stringify(appState, null, 2)], { type: "application/json" });
          const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `cv-${Date.now()}.json`; a.click();
          showToast("JSON dışa aktarıldı", "ok");
        };
        document.getElementById("set-import").onclick = () => document.getElementById("json-import-file").click();
        document.getElementById("json-import-file").onchange = e => {
          const f = e.target.files[0]; if (!f) return;
          const r = new FileReader(); r.onload = () => { try { appState = mergeDeep(JSON.parse(JSON.stringify(DEFAULT_STATE)), JSON.parse(r.result)); saveState(); renderActiveTab(); renderPreview(); showToast("İçe aktarıldı ✓", "ok"); closeModal("modal-settings"); } catch (err) { showToast("Geçersiz JSON", "err"); } };
          r.readAsText(f);
        };
        document.getElementById("set-reset").onclick = () => {
          if (confirm("Tüm CV verileri silinecek. Emin misiniz?")) {
            localStorage.removeItem(STORAGE_KEY);
            appState = JSON.parse(JSON.stringify(DEFAULT_STATE));
            renderActiveTab(); renderPreview(); recalcAtsScore();
            showToast("Tüm veri sıfırlandı", "ok");
            closeModal("modal-settings");
          }
        };

        // Modal close on background click
        document.querySelectorAll(".modal-bg").forEach(m => { m.onclick = e => { if (e.target === m) m.classList.remove("open"); }; });

        // Ollama banner buttons
        document.getElementById("btn-ollama-recheck").onclick = async () => {
          showToast("Bağlantı kontrol ediliyor...", "info");
          const r = await checkOllama();
          showToast(r ? "Bağlantı başarılı ✓" : "Hâlâ bağlanılamıyor", r ? "ok" : "err");
        };
        document.getElementById("btn-ollama-diagnose").onclick = async () => {
          showToast("Tanılama çalışıyor (30-60s sürebilir)...", "info");
          const report = await diagnoseOllama();
          const pre = document.getElementById("diag-output");
          pre.textContent = report;
          document.getElementById("modal-diag").classList.add("open");
        };
        document.getElementById("btn-ollama-cors").onclick = () => {
          const cmd = `setx OLLAMA_ORIGINS "*"`;
          navigator.clipboard.writeText(cmd).then(
            () => showToast("Komut panoya kopyalandı. Terminalde çalıştırın ve Ollama'yı yeniden başlatın.", "ok"),
            () => showToast("Kopyalanamadı: " + cmd, "err")
          );
        };
        document.getElementById("diag-close").onclick = () => document.getElementById("modal-diag").classList.remove("open");
        document.getElementById("diag-copy").onclick = () => {
          const t = document.getElementById("diag-output").textContent;
          navigator.clipboard.writeText(t).then(() => showToast("Rapor kopyalandı", "ok"));
        };

        // Ollama check
        await checkOllama();
        setInterval(checkOllama, 30000);
      }
      init();
  </script>
</body>
